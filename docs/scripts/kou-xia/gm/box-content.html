<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>盒裝內容確認 · 卡牌速查 — 寇俠 GM</title>
  <link rel="stylesheet" href="../../../assets/css/style.css">
  <style>
  /* ══════════════════════════════════════════════════
     盒裝內容確認 — Page-specific styles
     Extends base style.css; do not edit base tokens here.
     ══════════════════════════════════════════════════ */

  /* ── Toolbar ── */
  .bc-toolbar {
    position: sticky;
    top: 0;
    z-index: 40;
    background: var(--color-bg);
    padding: .9rem 0 .8rem;
    border-bottom: 1px solid var(--color-border);
    margin-bottom: 1.4rem;
  }
  .bc-search-wrap {
    position: relative;
    margin-bottom: .65rem;
  }
  .bc-search-icon {
    position: absolute;
    left: .85em;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    font-size: .88rem;
    opacity: .45;
  }
  #bc-search {
    width: 100%;
    background: #0c1830;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    color: var(--color-text);
    padding: .6em 1em .6em 2.4em;
    font-family: var(--font-body);
    font-size: .94rem;
    outline: none;
    transition: border-color .18s;
  }
  #bc-search:focus { border-color: var(--color-accent-light); }
  #bc-search::placeholder { color: #3d4f6e; }

  .bc-filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: .38rem;
  }
  .bc-filter {
    padding: .28em .9em;
    border-radius: 20px;
    border: 1px solid #2a3050;
    background: transparent;
    color: var(--color-text-muted);
    cursor: pointer;
    font-family: var(--font-body);
    font-size: .84rem;
    transition: all .15s;
    white-space: nowrap;
    line-height: 1.6;
  }
  .bc-filter:hover { border-color: #4a5a80; color: var(--color-text); }
  /* active state per category — colour derived from CAT_META in JS */
  .bc-filter.active { font-weight: bold; }

  /* ── Filter row wrapper (pills + expand-all button) ── */
  .bc-filter-bar {
    display: flex;
    align-items: flex-start;
    gap: .5rem;
  }
  .bc-filter-bar .bc-filter-row { flex: 1; }
  .bc-expand-btn {
    flex-shrink: 0;
    padding: .28em .9em;
    border-radius: 20px;
    border: 1px solid #2a3050;
    background: transparent;
    color: var(--color-text-muted);
    cursor: pointer;
    font-family: var(--font-body);
    font-size: .84rem;
    line-height: 1.6;
    transition: all .15s;
    white-space: nowrap;
  }
  .bc-expand-btn:hover { border-color: #4a5a80; color: var(--color-text); }
  .bc-expand-btn.active { background: #1a2a40; color: var(--color-accent-light); border-color: #4a6090; }

  /* ── Stats bar ── */
  .bc-stats {
    display: flex;
    flex-wrap: wrap;
    gap: .4rem;
    margin: 0 0 1.4rem;
    font-size: .81rem;
  }
  .bc-stat {
    display: flex;
    align-items: center;
    gap: .38rem;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 4px;
    padding: .28em .7em;
  }
  .bc-stat-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .bc-stat-label { color: var(--color-text-muted); }
  .bc-stat-count { font-weight: 700; color: var(--color-accent-light); margin-left: .15em; }

  /* ── Chapter divider (category section) ── */
  .bc-chapter {
    display: flex;
    align-items: center;
    gap: .8rem;
    margin: 1.8rem 0 .6rem;
    font-size: .78rem;
    font-family: var(--font-mono);
    letter-spacing: .08em;
    color: #3a4a6a;
  }
  .bc-chapter::before,
  .bc-chapter::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--color-border);
  }
  .bc-chapter-label {
    padding: .18em .8em;
    border-radius: 3px;
    font-weight: 700;
    white-space: nowrap;
  }
  .bc-chapter-total {
    white-space: nowrap;
    font-size: .78rem;
    color: #3a4a6a;
    flex-shrink: 0;
  }

  /* ── Group (subcategory) ── */
  .bc-group { margin-bottom: .2rem; }
  .bc-group-header {
    display: flex;
    align-items: center;
    gap: .6rem;
    padding: .42em .9em;
    background: #0c1626;
    border: 1px solid var(--color-border);
    border-bottom: none;
    border-radius: 4px 4px 0 0;
    margin-top: .9rem;
  }
  .bc-group-label {
    font-size: .75rem;
    font-family: var(--font-mono);
    font-weight: 700;
    padding: .12em .52em;
    border-radius: 3px;
    letter-spacing: .03em;
  }
  .bc-group-title {
    font-size: .92rem;
    font-weight: bold;
    color: var(--color-text);
  }
  .bc-group-total {
    margin-left: auto;
    font-size: .78rem;
    color: #4a5a7a;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  /* ── Item rows ── */
  .bc-wrap {
    border: 1px solid var(--color-border);
    border-radius: 0 0 4px 4px;
    overflow: hidden;
  }
  .bc-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    align-items: center;
    gap: .5rem;
    padding: .52em .9em;
    border-bottom: 1px solid #111d30;
    border-left: 3px solid transparent;
    background: var(--color-bg);
    transition: background .13s;
  }
  .bc-row:last-child { border-bottom: none; }
  .bc-row:nth-child(even) { background: rgba(255,255,255,.02); }
  .bc-row.clickable { cursor: pointer; }
  .bc-row.clickable:hover { background: #0d1d35; }
  .bc-row.pending { opacity: .62; }

  .bc-name {
    font-size: .9rem;
    display: flex;
    align-items: center;
    gap: .45rem;
    flex-wrap: wrap;
    min-width: 0;
  }
  .bc-no {
    font-size: .7rem;
    color: #404f68;
    font-family: var(--font-mono);
    flex-shrink: 0;
    white-space: nowrap;
  }
  .bc-pending-tag {
    font-size: .7rem;
    background: #241500;
    color: #b07030;
    border: 1px solid #4a2a00;
    border-radius: 3px;
    padding: .08em .42em;
    font-family: var(--font-mono);
    flex-shrink: 0;
  }
  .bc-holder {
    font-size: .74rem;
    color: #5a6a8a;
    white-space: nowrap;
    text-align: right;
  }
  .bc-qty {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 2.1em;
    height: 2.1em;
    background: #081d10;
    color: var(--color-accent-light);
    border-radius: 50%;
    font-size: .8rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    border: 1px solid #163020;
    flex-shrink: 0;
  }
  .bc-arrow {
    color: #2a3a5a;
    font-size: .72rem;
    flex-shrink: 0;
    transition: transform .18s;
    user-select: none;
    width: 1em;
    text-align: center;
  }
  .bc-row.open .bc-arrow { transform: rotate(90deg); color: var(--color-accent-light); }

  /* ── Detail panel ── */
  .bc-detail {
    display: none;
    padding: .7em 1em .8em 1.5em;
    background: #070d1a;
    border-bottom: 1px solid #111d30;
    border-left: 3px solid transparent;
    font-size: .85rem;
    color: #7a8aaa;
    line-height: 1.8;
  }
  .bc-detail.open { display: block; }
  .bc-detail-label {
    font-size: .72rem;
    font-family: var(--font-mono);
    color: var(--color-accent-light);
    letter-spacing: .05em;
    margin-bottom: .25em;
    opacity: .75;
  }
  .bc-detail-body { white-space: pre-line; }
  .bc-detail blockquote {
    border-left: 2px solid #1e2e46;
    margin: .4em 0 0;
    padding: .25em .75em;
    color: #556070;
    font-style: italic;
    background: transparent;
    border-radius: 0;
    white-space: pre-line;
  }

  /* ── No results ── */
  .bc-empty {
    text-align: center;
    color: var(--color-text-muted);
    padding: 3rem 1rem;
    font-size: .92rem;
  }

  /* ── Mobile ── */
  @media (max-width: 560px) {
    .bc-row { grid-template-columns: 1fr auto auto; }
    .bc-holder { display: none; }
  }
  </style>
</head>

let activeCat = '全部';
let searchQ   = '';

/* ══════════════════════════════════════════════════════════════
   Render helpers
   ══════════════════════════════════════════════════════════════ */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function qtyTotal(items) { return items.reduce((s,i) => s + i.qty, 0); }

function toggleExpandAll() {
  const btn = document.getElementById('bc-expand-all');
  const isExpanding = btn.textContent === '全部展開';
  document.querySelectorAll('.bc-row.clickable').forEach(row => {
    const det = document.getElementById('det-' + row.dataset.id);
    if (!det) return;
    row.classList.toggle('open', isExpanding);
    det.classList.toggle('open', isExpanding);
  });
  btn.textContent = isExpanding ? '全部收合' : '全部展開';
  btn.classList.toggle('active', isExpanding);
}

function buildFilters() {
  const row = document.getElementById('bc-filters');
  const cats = ['全部', '劇本', '線索卡', '物品卡', '武器卡', 'Buff卡', '技能卡', '銀票', '其他'];
  row.innerHTML = cats.map(c => {
    const m = CAT_META[c];
    const active = c === activeCat;
    const style = active
      ? `background:${m.color};border-color:${m.color};color:${c==='劇本'||c==='技能卡'||c==='銀票'?'#1a1a2e':'#fff'};`
      : '';
    return `<button class="bc-filter${active?' active':''}" data-cat="${esc(c)}" style="${style}">${esc(c)}</button>`;
  }).join('');
}

function buildStats() {
  const cats = ['劇本', '線索卡', '物品卡', '武器卡', 'Buff卡', '技能卡', '銀票', '其他'];
  const total = qtyTotal(ITEMS);
  const el = document.getElementById('bc-stats');
  el.innerHTML = `
    <div class="bc-stat">
      <div class="bc-stat-dot" style="background:#e94560"></div>
      <span class="bc-stat-label">合計</span>
      <span class="bc-stat-count">${total}</span>
    </div>
    ${cats.map(c => {
      const qty = qtyTotal(ITEMS.filter(i => i.cat === c));
      const color = CAT_META[c].color;
      return `<div class="bc-stat">
        <div class="bc-stat-dot" style="background:${color}"></div>
        <span class="bc-stat-label">${c}</span>
        <span class="bc-stat-count">${qty}</span>
      </div>`;
    }).join('')}
  `;
}

function buildList() {
  const listEl  = document.getElementById('bc-list');
  const emptyEl = document.getElementById('bc-empty');
  const q = searchQ.toLowerCase();

  const filtered = ITEMS.filter(item => {
    const catOk = activeCat === '全部' || item.cat === activeCat;
    const searchOk = !q
      || item.name.toLowerCase().includes(q)
      || item.sub.toLowerCase().includes(q)
      || item.cat.toLowerCase().includes(q)
      || (item.holder && item.holder.toLowerCase().includes(q))
      || (item.note && item.note.toLowerCase().includes(q))
      || (item.no !== undefined && String(item.no).includes(q));
    return catOk && searchOk;
  });

  if (!filtered.length) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  /* Group by cat then sub, preserving original order */
  const catOrder = ['劇本','線索卡','物品卡','武器卡','Buff卡','技能卡','銀票','其他'];
  const subOrder  = ['手冊','角色劇本','NPC劇本',
                     '線索卡','物品卡','武器卡','Buff卡',
                     '天賦卡','武功卡','絕學卡',
                     '銀票','其他'];

  /* Build (cat → sub → items) map */
  const grouped = {};
  filtered.forEach(item => {
    if (!grouped[item.cat]) grouped[item.cat] = {};
    if (!grouped[item.cat][item.sub]) grouped[item.cat][item.sub] = [];
    grouped[item.cat][item.sub].push(item);
  });

  const cats = catOrder.filter(c => grouped[c]);
  let html = '';

  cats.forEach(cat => {
    const catColor = CAT_META[cat].color;
    const catTotal = qtyTotal(Object.values(grouped[cat]).flat());
    html += `<div class="bc-chapter">
      <span class="bc-chapter-label" style="background:${CAT_META[cat].bg};color:${catColor};border:1px solid ${catColor}33">${cat}</span>
      <span class="bc-chapter-total">${catTotal} 張</span>
    </div>`;

    const subs = subOrder.filter(s => grouped[cat][s]);
    subs.forEach(sub => {
      const items = grouped[cat][sub];
      const subColor = SUB_COLOR[sub] || catColor;
      const subTotal = qtyTotal(items);

      html += `<div class="bc-group">
        <div class="bc-group-header">
          <span class="bc-group-label" style="background:${subColor}1a;color:${subColor};border:1px solid ${subColor}33">${sub}</span>
          <span class="bc-group-title">${sub === '其他' ? cat : sub}</span>
          <span class="bc-group-total">共 ${subTotal} 張</span>
        </div>
        <div class="bc-wrap">`;

      items.forEach(item => {
        const hasDetail = !!(item.desc || item.note);
        const noTag = item.no !== undefined
          ? `<span class="bc-no">#${esc(item.no)}</span>` : '';
        const pendingTag = item.pending
          ? `<span class="bc-pending-tag">待補充</span>` : '';
        const holderHtml = item.holder
          ? `<span class="bc-holder">${esc(item.holder)}</span>` : `<span></span>`;
        const arrow = hasDetail ? `<span class="bc-arrow">▶</span>` : `<span class="bc-arrow" style="opacity:0">▶</span>`;

        html += `<div class="bc-row${hasDetail?' clickable':''}${item.pending?' pending':''}"
            style="border-left-color:${subColor}"
            data-id="${item.id}">
          <div class="bc-name">${noTag}<span>${esc(item.name)}</span>${pendingTag}</div>
          ${holderHtml}
          <div class="bc-qty">×${item.qty}</div>
          ${arrow}
        </div>`;

        if (hasDetail) {
          html += `<div class="bc-detail" id="det-${item.id}" style="border-left-color:${subColor}">
            ${item.desc ? `<div class="bc-detail-label">卡面文字</div><div class="bc-detail-body">${esc(item.desc)}</div>` : ''}
            ${item.note ? `<blockquote>${esc(item.note)}</blockquote>` : ''}
          </div>`;
        }
      });

      html += `</div></div>`;
    });
  });

  listEl.innerHTML = html;
  /* Reset expand-all button whenever list is rebuilt */
  const expandBtn = document.getElementById('bc-expand-all');
  if (expandBtn) { expandBtn.textContent = '全部展開'; expandBtn.classList.remove('active'); }
}

/* ══════════════════════════════════════════════════════════════
   Event delegation — expand/collapse
   ══════════════════════════════════════════════════════════════ */
document.getElementById('bc-list').addEventListener('click', e => {
  const row = e.target.closest('.bc-row.clickable');
  if (!row) return;
  const id  = row.dataset.id;
  const det = document.getElementById('det-' + id);
  if (!det) return;
  const open = row.classList.toggle('open');
  det.classList.toggle('open', open);
});

/* ── Filters ── */
document.getElementById('bc-filters').addEventListener('click', e => {
  const btn = e.target.closest('.bc-filter');
  if (!btn) return;
  activeCat = btn.dataset.cat;
  buildFilters();
  buildList();
});

/* ── Search ── */
document.getElementById('bc-search').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  buildList();
});

/* ── Init ── */
buildFilters();
buildStats();
buildList();
document.getElementById('bc-expand-all').addEventListener('click', toggleExpandAll);
</script>

</body>
</html>
